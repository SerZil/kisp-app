name: Daily Deploy to Cloudflare Pages

on:
  schedule:
    - cron: '0 15 * * *'  # 12:00 Argentina time (UTC-3)
    - cron: '0 20 * * *'  # 17:00 Argentina time (UTC-3)
  workflow_dispatch:      # also allows manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Deploy Hook
        run: |
          curl -X POST "${{ secrets.CF_DEPLOY_HOOK }}"
